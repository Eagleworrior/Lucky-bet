<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>LUCKY BET | Integrated Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050811; color: white; }
    </style>
</head>
<body class="p-6">
    <header class="flex justify-between items-center mb-8 bg-[#090f1c] p-4 rounded-2xl border border-slate-800">
        <h1 class="text-2xl font-black text-emerald-400">LUCKY BET</h1>
        <div class="text-right">
            <p class="text-[9px] text-slate-400 uppercase font-bold">Wallet Balance</p>
            <div id="balance-display" class="text-luckyGreen font-mono font-black">KES 0.00</div>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div id="game-list" class="md:col-span-2 space-y-3">
            <h2 class="text-sm font-bold text-slate-500 uppercase">Live Matches</h2>
            </div>

        <div class="bg-[#090f1c] p-6 rounded-2xl border border-slate-800 h-fit">
            <h3 class="text-xs font-black uppercase mb-4">Wager Slip</h3>
            <div id="slip-area" class="text-slate-500 text-xs mb-4">No selections made.</div>
            <button onclick="placeBet()" class="w-full bg-emerald-500 text-black font-black py-3 rounded-xl hover:bg-emerald-400">PLACE WAGER</button>
        </div>
    </div>

    <script>
        // --- VIRTUAL BACKEND ENGINE ---
        // This replaces the need for a separate server.js for now.
        const mockDatabase = {
            balanceCents: 50000,
            matches: [
                { id: "m1", league: "Premier League", home: "Chelsea", away: "Arsenal", odds: 2.10 },
                { id: "m2", league: "La Liga", home: "Real Madrid", away: "Barcelona", odds: 1.95 }
            ]
        };

        // Render UI
        function loadUI() {
            document.getElementById('balance-display').innerText = `KES ${(mockDatabase.balanceCents / 100).toFixed(2)}`;
            const list = document.getElementById('game-list');
            list.innerHTML = mockDatabase.matches.map(m => `
                <div class="bg-[#0d1527] p-4 rounded-xl border border-slate-800 flex justify-between items-center">
                    <div>
                        <div class="text-[10px] text-emerald-500 font-bold">${m.league}</div>
                        <div class="font-bold">${m.home} vs ${m.away}</div>
                    </div>
                    <button onclick="selectBet('${m.id}', ${m.odds})" class="bg-black border border-slate-700 px-4 py-2 rounded-lg text-emerald-400 font-mono font-bold">
                        ${m.odds.toFixed(2)}
                    </button>
                </div>
            `).join('');
        }

        function selectBet(id, odds) {
            document.getElementById('slip-area').innerHTML = `Selected Odds: <span class="text-white">${odds.toFixed(2)}</span>`;
        }

        function placeBet() {
            alert("Success: Wager placed against virtual engine!");
            mockDatabase.balanceCents -= 1000; // Deduct 10 KES
            loadUI();
        }

        loadUI();
    </script>
</body>
</html>
